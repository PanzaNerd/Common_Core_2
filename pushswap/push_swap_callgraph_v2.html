<script>
const D = {
  main: { name:"main", desc:"Punto di ingresso. Controlla che ci siano argomenti (ac >= 2), chiama parse_args per costruire lo stack A, poi decide quale algoritmo usare in base alla dimensione: sort_two (2 elementi), sort_three (3 elementi), turk_sort (4+). Alla fine libera la memoria con free_stack.", hint:"File: main.c" },
  parse_args: { name:"parse_args", desc:"Legge gli argomenti dal fondo verso l'inizio e costruisce lo stack A. Per ogni argomento chiama is_valid → ft_atol → has_dup → push_node. Se uno fallisce → stampa 'Error' su stderr → exit(1). Parte dal fondo perché push_node aggiunge in cima — così il primo argomento finisce in cima allo stack.", hint:"File: parse.c" },
  stack_size: { name:"stack_size", desc:"Scorre tutta la linked list contando i nodi uno per uno. Ritorna il numero totale di elementi. Usata in main per sapere quanti elementi ci sono, e da turk_sort per decidere quanti pb fare.", hint:"File: utils.c" },
  is_sorted: { name:"is_sorted", desc:"Scorre la lista e controlla che ogni nodo abbia valore minore del successivo. Se trova un'inversione ritorna 0 (non ordinato). Se arriva in fondo ritorna 1 (ordinato). Usata nel main per uscire subito se la lista è già ordinata — nessuna mossa stampata.", hint:"File: utils2.c" },
  assign_index: { name:"assign_index", desc:"Per ogni nodo, conta quanti altri nodi hanno valore minore — quello è il suo indice (rango). Usa due cursori annidati: cur scorre ogni nodo, inner scorre tutta la lista per contare. Il minimo ha sempre index=0, il massimo index=n-1. Serve perché il Turk lavora con posizioni relative, non valori assoluti.", hint:"File: parse.c" },
  is_valid: { name:"is_valid", desc:"Controlla che la stringa sia un numero valido. Salta il segno (- o +) se presente, poi verifica che ogni carattere sia tra '0' e '9'. Se trova qualcosa di strano ritorna 0 → parse_args chiama error_exit.", hint:"File: parse.c" },
  ft_atol: { name:"ft_atol", desc:"Converte una stringa in long (non int) per poter rilevare overflow. Costruisce il numero cifra per cifra. Se il risultato supera INT_MAX o scende sotto INT_MIN, ritorna un valore volutamente fuori range che parse_args intercetta e tratta come errore.", hint:"File: parse.c" },
  has_dup: { name:"has_dup", desc:"Scorre tutta la linked list corrente. Se trova un nodo con lo stesso valore di val, ritorna 1 (duplicato trovato) → error_exit. Se arriva in fondo senza trovarlo, ritorna 0 (nessun duplicato). Chiamata prima di ogni push_node.", hint:"File: parse.c" },
  push_node: { name:"push_node", desc:"Crea un nuovo nodo con new_node e lo mette in cima allo stack. Il nuovo nodo punta al vecchio top (*stack), poi il puntatore dello stack viene aggiornato al nuovo nodo. Prende ** perché deve modificare il puntatore stesso.", hint:"File: utils.c" },
  new_node: { name:"new_node", desc:"Alloca un nuovo nodo con malloc. Inizializza value con il numero passato e tutti gli altri campi (index, pos, target_pos, cost_a, cost_b) a 0, next a NULL. Se malloc fallisce, exit(1). Chiamata ogni volta che si aggiunge un elemento allo stack.", hint:"File: utils.c" },
  turk_sort: { name:"turk_sort", desc:"Orchestratore dell'algoritmo Turk. In ordine: 1) push_to_b — svuota A in B tranne 3 elementi, 2) sort_three — ordina i 3 rimasti in A, 3) loop su B: set_positions → set_target → set_costs → cheapest → do_move finché B è vuoto, 4) rotate_min — porta il minimo in cima.", hint:"File: turk3.c" },
  push_to_b: { name:"push_to_b", desc:"Spinge elementi da A a B usando una finestra scorrevole. La finestra è pushed + group_size. Ad ogni push, pushed aumenta di 1 allargando la finestra di 1 — così tutti gli elementi vengono prima o poi catturati. Se l'indice è nella metà bassa della finestra fa rb per pre-organizzare B con gli indici alti in cima.", hint:"File: turk3.c" },
  sort_three: { name:"sort_three", desc:"Ordina 3 elementi con massimo 2-3 mosse. Tutti i casi possibili sono hardcodati con if/else. Usa gli indici (non i valori) per evitare overflow con INT_MAX e INT_MIN. Se i 3 elementi sono già in ordine non fa niente.", hint:"File: sort.c" },
  set_positions: { name:"set_positions", desc:"Scorre A e B e assegna a ogni nodo la sua posizione fisica corrente: pos=0 per il top, pos=1 per il secondo, ecc. Chiamata ogni iterazione del loop perché le posizioni cambiano dopo ogni do_move. Serve a set_costs per calcolare le rotazioni.", hint:"File: turk.c" },
  set_target: { name:"set_target", desc:"Per ogni elemento di B trova il suo successore immediato in A — il più piccolo tra tutti i nodi di A con indice maggiore. L'elemento di B andrà inserito davanti a lui. Se non esiste successore (è il massimo attuale) → find_min → target è il minimo di A, l'elemento va in cima circolarmente.", hint:"File: turk.c" },
  set_costs: { name:"set_costs", desc:"Calcola cost_b (rotazioni per portare l'elemento in cima a B) e cost_a (rotazioni per portare il target in cima ad A). Il segno indica la direzione: positivo = ra/rb in avanti, negativo = rra/rrb al contrario. Prima metà dello stack → vai avanti, seconda metà → torna indietro.", hint:"File: turk.c" },
  cheapest: { name:"cheapest", desc:"Scorre tutti gli elementi di B e trova quello con total_cost minore. Inizia con best_cost=INT_MAX così qualsiasi costo reale sarà minore. Ritorna il puntatore al nodo più economico da inserire in A.", hint:"File: turk2.c" },
  find_min: { name:"find_min", desc:"Scorre tutta la lista A e ritorna il nodo con index più basso — il minimo assoluto. Usata da set_target quando un elemento di B è il massimo attuale e non ha successori in A: in quel caso il target è il minimo, l'elemento si inserisce circolarmente.", hint:"File: turk2.c" },
  total_cost: { name:"total_cost", desc:"Calcola il costo totale di un inserimento. Se cost_a e cost_b hanno lo stesso segno → si usano rr/rrr → costo = max dei due (risparmio di mosse). Se hanno segni opposti → mosse separate → costo = somma dei valori assoluti.", hint:"File: turk.c" },
  abs_val: { name:"abs_val", desc:"Ritorna il valore assoluto di un numero. Se n < 0 ritorna -n, altrimenti ritorna n. Usata da total_cost per confrontare i costi senza preoccuparsi del segno — il segno indica la direzione, il valore assoluto indica quante mosse.", hint:"File: turk.c" },
  do_move: { name:"do_move", desc:"Esegue l'inserimento dell'elemento più economico. Legge cost_a e cost_b dal nodo scelto da cheapest. Prima chiama do_rotations (rotazioni simultanee rr/rrr), poi do_single_rotations (rotazioni rimanenti su A e B separatamente), infine pa per spostare l'elemento in cima ad A.", hint:"File: turk2.c" },
  rotate_min: { name:"rotate_min", desc:"Alla fine, quando B è vuoto, trova il nodo con index=0 (il minimo assoluto) scorrendo A e conta la sua posizione. Se è nella prima metà usa ra, nella seconda usa rra — sceglie sempre la direzione più corta per portarlo in cima.", hint:"File: turk3.c" },
  do_rotations: { name:"do_rotations", desc:"Esegue le rotazioni simultanee quando cost_a e cost_b hanno lo stesso segno. Usa rr se entrambi positivi, rrr se entrambi negativi. Ad ogni rr/rrr decrementa/incrementa entrambi i contatori. Risparmia mosse rispetto a fare ra e rb separatamente.", hint:"File: turk2.c" },
  do_single: { name:"do_single_rotations", desc:"Esegue le rotazioni rimanenti su A e B separatamente dopo do_rotations. rb/rrb per B fino a cb=0, ra/rra per A fino a ca=0. Il contatore viene incrementato o decrementato ad ogni mossa — quando raggiunge 0 si ferma.", hint:"File: turk2.c" },
  pa: { name:"pa", desc:"Prende il top di B e lo mette in cima ad A. Operazione atomica: stacca il primo nodo di B (src), lo ricollega come nuovo top di A (dst). Stampa 'pa' su stdout.", hint:"File: operations2.c" },
  ra: { name:"ra", desc:"Rotate A: il top di A va in fondo. Il secondo elemento diventa il nuovo top. Implementata con rotate() — trova l'ultimo nodo, stacca il primo, lo attacca dopo l'ultimo. Stampa 'ra'.", hint:"File: operations2.c" },
  rra: { name:"rra", desc:"Reverse rotate A: il fondo di A va in cima. L'ultimo elemento diventa il nuovo top. Implementata con rev_rotate() — trova penultimo e ultimo, stacca l'ultimo, lo mette prima del vecchio top. Stampa 'rra'.", hint:"File: operations3.c" },
  rr: { name:"rr", desc:"ra e rb eseguiti insieme in una sola mossa. Usato da do_rotations quando cost_a e cost_b sono entrambi positivi. Risparmia una mossa rispetto a fare ra e rb separatamente. Stampa 'rr'.", hint:"File: operations3.c" },
  rrr: { name:"rrr", desc:"rra e rrb eseguiti insieme in una sola mossa. Usato da do_rotations quando cost_a e cost_b sono entrambi negativi. Risparmia una mossa rispetto a fare rra e rrb separatamente. Stampa 'rrr'.", hint:"File: operations3.c" }
};

function show(k) {
  const d = D[k];
  if (!d) return;
  document.getElementById('info-name').textContent = d.name;
  document.getElementById('info-desc').textContent = d.desc;
  document.getElementById('info-hint').textContent = d.hint || '';
}
</script>
